<!DOCTYPE html>
<html lang="en">
<head>
    <title>Card Manager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="styles.css" rel="stylesheet" type="text/css">
    <link href="../../navbar.css" rel="stylesheet" type="text/css">
    <script src="../../navbar.js" defer></script>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script>
        // Load the navbar
        fetch('../../navbar.html')
    .then(response => response.text())
    .then(data => {
        // Create the #navi container
        const naviContainer = document.createElement('div');
        naviContainer.id = 'navi';
        naviContainer.innerHTML = data;
        
        // Insert at the beginning of body
        document.body.insertBefore(naviContainer, document.body.firstChild);
        
        // Dynamically set body padding-top based on actual navbar height
        const setNavbarPadding = () => {
            const navbarHeight = naviContainer.offsetHeight;
            // Preserve existing body padding while adding navbar space
            const currentPadding = window.getComputedStyle(document.body).paddingTop;
            // Only set if navbar exists
            if (navbarHeight > 0) {
                document.body.style.paddingTop = navbarHeight + 'px';
            }
        };
        
        // Set padding after render
        requestAnimationFrame(setNavbarPadding);
        
        // Update on resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(setNavbarPadding, 250);
        });
    });
    </script>
    
</head>
<body>
    <!-- Inject navbar -->
    <div id="navi"></div>

    <div class="quote-block">
        <blockquote style="color: #2e2e2e;">
            This page allows users to create and manage small profile cards.
        </blockquote>
    </div>

    <div class="container">
        <div class="container2">
            <h1><strong>Create and Manage Cards</strong></h1>

            <!-- User input form -->
            <form id="cardForm">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="address">Address:</label><br>
                <input type="text" id="address" name="address" required><br><br>

                <label for="phone">Phone:</label><br>
                <input type="text" id="phone" name="phone" pattern="\d*" required><br><br>

                <label for="birthdate">Birthdate:</label><br>
                <input type="date" id="birthdate" name="birthdate" required><br><br>
            </form>

            <div class="form-buttons">
                <button onclick="createCard()">Create Card</button>
                <button onclick="switchCardVisibility()">Hide Cards</button>
            </div>
        </div>

        <div id="cardsContainer"></div>
    </div>

    <script src="cards.js"></script>
</body>
</html>
